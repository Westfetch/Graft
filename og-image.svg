<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#080808"/>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#fade)"/>
  <text x="80" y="170" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" letter-spacing="6" fill="#666">// INDEPENDENT WORKER INFRASTRUCTURE</text>
  <text x="72" y="360" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="700" font-size="190" letter-spacing="-6" fill="#ffffff">GRAFT</text>
  <text x="80" y="450" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="34" fill="#e8e8e8">Do the graft. We'll handle the rest.</text>
  <text x="80" y="522" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" fill="#888">Now live: <tspan fill="#e8955a" font-weight="500">JobDog</tspan> &#8212; job search with a dog that actually helps.</text>
</svg>
