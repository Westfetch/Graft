<svg xmlns="http://www.w3.org/2000/svg" width="640" height="820" viewBox="0 0 640 820" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3a2e26" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- device panel -->
  <rect x="20" y="16" width="600" height="788" rx="46" fill="#fdf8ef" stroke="#eae1d1" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- status row -->
  <text x="60" y="64" font-size="17" font-weight="600" fill="#7a6b5f">9:41</text>
  <circle cx="556" cy="58" r="4" fill="#b8aea3"/><circle cx="572" cy="58" r="4" fill="#b8aea3"/><circle cx="588" cy="58" r="4" fill="#7a6b5f"/>

  <!-- app title -->
  <text x="320" y="124" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#3a2e26">JobDog</text>
  <text x="320" y="154" text-anchor="middle" font-size="16" fill="#7a6b5f">Feed the dog. Apply to jobs.</text>

  <!-- dog -->
  <g>
    <!-- ears -->
    <ellipse cx="246" cy="258" rx="30" ry="58" fill="#b9986f" transform="rotate(-20 246 258)"/>
    <ellipse cx="394" cy="258" rx="30" ry="58" fill="#b9986f" transform="rotate(20 394 258)"/>
    <!-- head -->
    <circle cx="320" cy="266" r="84" fill="#d9b892"/>
    <ellipse cx="320" cy="228" rx="66" ry="46" fill="#ecd9b6" opacity="0.55"/>
    <!-- eyes -->
    <circle cx="291" cy="256" r="9" fill="#3a2e26"/>
    <circle cx="349" cy="256" r="9" fill="#3a2e26"/>
    <circle cx="294" cy="253" r="3" fill="#fff"/>
    <circle cx="352" cy="253" r="3" fill="#fff"/>
    <!-- muzzle -->
    <ellipse cx="320" cy="306" rx="44" ry="34" fill="#ecd9b6"/>
    <ellipse cx="320" cy="292" rx="13" ry="9" fill="#3a2e26"/>
    <path d="M320 301 V312" stroke="#3a2e26" stroke-width="3" stroke-linecap="round"/>
    <path d="M320 312 q-13 12 -24 4 M320 312 q13 12 24 4" stroke="#3a2e26" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="320" cy="330" rx="10" ry="13" fill="#c97265"/>
    <!-- collar + tag -->
    <path d="M250 332 q70 40 140 0" stroke="#6a9175" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="320" cy="356" r="9" fill="#f2c464"/>
  </g>

  <!-- streak pill -->
  <rect x="232" y="392" width="176" height="34" rx="17" fill="#e4ede6"/>
  <text x="320" y="414" text-anchor="middle" font-size="14" font-weight="600" fill="#486c54">On a 3-day streak</text>

  <!-- job card -->
  <rect x="56" y="452" width="528" height="158" rx="20" fill="#ffffff" stroke="#eae1d1" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="84" y="498" font-size="23" font-weight="700" fill="#3a2e26">Warehouse Operative</text>
  <text x="84" y="526" font-size="15" fill="#7a6b5f">Bristol  ·  £12.21/hr  ·  Full-time</text>
  <rect x="84" y="544" width="148" height="30" rx="15" fill="#fce5d4"/>
  <text x="158" y="564" text-anchor="middle" font-size="13" font-weight="600" fill="#e87b3c">Earns a biscuit</text>
  <rect x="430" y="538" width="126" height="46" rx="14" fill="#3a2e26"/>
  <text x="493" y="567" text-anchor="middle" font-size="15" font-weight="600" fill="#fdf8ef">Tailor CV</text>

  <!-- second card peeking -->
  <rect x="80" y="622" width="480" height="74" rx="18" fill="#ffffff" stroke="#eae1d1" stroke-width="1" opacity="0.55"/>
  <text x="104" y="652" font-size="18" font-weight="700" fill="#3a2e26" opacity="0.7">Delivery Driver</text>
  <text x="104" y="676" font-size="14" fill="#7a6b5f" opacity="0.7">Bristol  ·  £13.50/hr</text>

  <!-- bottom tab bar -->
  <rect x="20" y="724" width="600" height="80" rx="0" fill="#f6ede0"/>
  <line x1="20" y1="724" x2="620" y2="724" stroke="#eae1d1" stroke-width="1"/>
  <circle cx="170" cy="760" r="6" fill="#7a6b5f"/><text x="170" y="786" text-anchor="middle" font-size="12" fill="#7a6b5f">Home</text>
  <circle cx="320" cy="760" r="6" fill="#6a9175"/><text x="320" y="786" text-anchor="middle" font-size="12" font-weight="700" fill="#486c54">Jobs</text>
  <circle cx="470" cy="760" r="6" fill="#7a6b5f"/><text x="470" y="786" text-anchor="middle" font-size="12" fill="#7a6b5f">Dog</text>
</svg>
